name: Test documentation deployment

on:
  pull_request:
    branches: [master]
    paths: [docs/**]

jobs:
  test-deploy:
    name: Test documentation deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 16.x
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - name: Test build
        working-directory: docs
        run: |
          pnpm install
          pnpm build
