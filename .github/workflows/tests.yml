name: CI Testing

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x, 18.x]

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '${{ matrix.node-version }}'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.18.3

    - name: Install dependencies
      run: pnpm install

    - name: Run tests
      run: pnpm test:ci
